apiVersion: apps/v1
kind: Deployment
metadata:
  name: tictactoe-deployment
  labels:
    app: tictactoe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tictactoe
  template:
    metadata:
      labels:
        app: tictactoe
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: tictactoe
        # Tag akan di-update otomatis oleh Jenkins pipeline (kubectl set image)
        # Contoh: :1 → :2 → :3 setiap kali pipeline dijalankan
        image: jarvisregis.azurecr.io/tictactoe:1
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: tictactoe-service
spec:
  # LoadBalancer di bare-metal VM tidak dapat External IP otomatis dari Azure,
  # tapi NodePort 30007 tetap bisa diakses via: http://<IP_WORKER>:30007
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007
    protocol: TCP
  selector:
    app: tictactoe
